<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic</title>
<link rel="stylesheet" href="/css/style.css?v=108">
</head>
<body>
<div class="app">
  <!-- Left Sidebar -->
  <!-- SIDEBAR -->

  <div class="col-resize" id="sidebarResize"></div>

  <!-- Main Area -->
  <div class="main">
    <!-- Top bar -->
    <div class="topbar" id="mainTopbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()"><svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M16.5 4A1.5 1.5 0 0 1 18 5.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 2 14.5v-9A1.5 1.5 0 0 1 3.5 4zM7 15h9.5a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5H7zM3.5 5a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5H6V5z"/></svg></button>
        <span id="statusBadge" class="status-badge">connecting...</span>
        <span id="chatAgentBadge" class="runtime-badge agent-badge" onclick="openAgentSelector('chat')" title="Chat agent model">Chat: ...</span>
        <span id="execAgentBadge" class="runtime-badge agent-badge" onclick="openAgentSelector('exec')" title="Execution agent model">Exec: ...</span>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="toggleDetail()" id="btnDetail">Detail Panel</button>
      </div>
    </div>

    <!-- Chat area -->
    <div id="chatView">
      <div class="chat-area" id="chatArea">
        <div class="chat-messages" id="chatMessages">
          <div class="welcome" id="welcomeScreen" style="display:none">
            <div class="welcome-top">
              <div class="welcome-logo">{<span class="logo-l1">L</span><span class="logo-l2">L</span><span class="logo-m">M</span>}</div>
              <div class="welcome-title">Agentic Programming</div>
              <div class="welcome-text">
                Run agentic functions, create new ones, or ask questions.
                Type a command or natural language below.
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="welcome-examples" id="welcomeExamples" style="display:none">
        <div class="welcome-example" onclick="clickFnExample('sentiment')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216ZM80,108a12,12,0,1,1,12,12A12,12,0,0,1,80,108Zm96,0a12,12,0,1,1-12-12A12,12,0,0,1,176,108Zm-1.07,48c-10.29,17.79-27.4,28-46.93,28s-36.63-10.2-46.92-28a8,8,0,1,1,13.84-8c7.47,12.91,19.21,20,33.08,20s25.61-7.1,33.07-20a8,8,0,0,1,13.86,8Z"/></svg>Run sentiment</div>
        <div class="welcome-example" onclick="clickFnExample('deep_work')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M231.65,194.55,198.46,36.75a16,16,0,0,0-19-12.39L132.65,34.42a16.08,16.08,0,0,0-12.3,19l33.19,157.8A16,16,0,0,0,169.16,224a16.25,16.25,0,0,0,3.38-.36l46.81-10.06A16.09,16.09,0,0,0,231.65,194.55ZM136,69.28a8,8,0,0,1,9.34-6.37l46.81-10.06a8,8,0,0,1,3.32,15.66L148.7,78.57a8,8,0,0,1-9.34-6.37A7.72,7.72,0,0,1,136,69.28Zm-4.19,19.84a8,8,0,0,1,9.34-6.38l46.81-10.06a8,8,0,0,1,3.32,15.67l-46.81,10.06A8,8,0,0,1,135.16,92,7.72,7.72,0,0,1,131.84,89.12ZM216,208H40a16,16,0,0,1-16-16V64A16,16,0,0,1,40,48H96a8,8,0,0,1,0,16H40V192H216a8,8,0,0,1,0,16Z"/></svg>Deep work</div>
        <div class="welcome-example" onclick="clickFnExample('create')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M80,64a8,8,0,0,1,8-8h80a8,8,0,0,1,0,16H88A8,8,0,0,1,80,64Zm8,48h80a8,8,0,0,0,0-16H88a8,8,0,0,0,0,16Zm40,16H88a8,8,0,0,0,0,16h40a8,8,0,0,0,0-16ZM216,88V216a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V40A16,16,0,0,1,56,24H168a8,8,0,0,1,5.66,2.34l40,40A8,8,0,0,1,216,72Zm-56-8h28.69L176,67.31V80ZM200,216V96H168a8,8,0,0,1-8-8V56H56V216H200Z"/></svg>Create function</div>
        <div class="welcome-example" onclick="clickFnExample('edit')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M226.76,69a8,8,0,0,0-12.84-2.88l-40.3,37.19-17.23-3.7-3.7-17.23,37.19-40.3A8,8,0,0,0,187,29.24,72,72,0,0,0,88,96a72.34,72.34,0,0,0,3.79,16.76L33.17,159.05a32,32,0,0,0,45.26,45.26l46.29-58.58A72.34,72.34,0,0,0,144,152,72,72,0,0,0,226.76,69ZM144,136a56.5,56.5,0,0,1-18-2.93,8,8,0,0,0-8.58,2.13L67.06,193.25a16,16,0,0,1-22.62-22.62l58.05-50.31a8,8,0,0,0,2.13-8.58A56.5,56.5,0,0,1,104,96a56,56,0,0,1,97.61-37.42l-30.69,33.24a8,8,0,0,0-1.85,6.36l5.21,24.23a8,8,0,0,0,6.15,6.15l24.23,5.21,33.24-30.69A56,56,0,0,1,144,136Z"/></svg>Edit function</div>
      </div>
      <div class="input-area">
        <div class="input-wrapper">
          <button class="send-btn" id="sendBtn" onclick="onSendBtnClick()" title="Send message"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
          <button class="stop-btn" id="stopBtn" onclick="stopExecution()" title="Stop" style="display:none"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
          <div class="input-top-row">
            <textarea id="chatInput" class="chat-input" placeholder="create / run / edit or ask anything..." rows="1"></textarea>
          </div>
          <div class="input-bottom-row">
            <div class="input-options">
              <div class="thinking-selector" id="thinkingSelector" onclick="toggleThinkingMenu(event)">
                <span id="thinkingLabel">effort: …</span>
                <svg class="thinking-arrow" width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div class="thinking-menu" id="thinkingMenu"></div>
            </div>
            <div id="contextStats" class="context-stats-label"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="col-resize" id="detailResize"></div>

  <!-- Right Detail Panel -->
  <div id="detailPanel" class="detail-panel collapsed">
    <div class="detail-header">
      <div id="detailTitle" class="detail-title">Node Detail</div>
      <div class="detail-header-actions">
        <button class="detail-close" onclick="closeDetail()">&times;</button>
      </div>
    </div>
    <div id="detailBody" class="detail-body"></div>
  </div>
</div>

<!-- External Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<!-- Application Scripts (order matters: state → helpers → tree → chat → sidebar → providers → settings → ui → init) -->
<script src="/js/state.js?v=6"></script>
<script src="/js/helpers.js?v=15"></script>
<script src="/js/tree.js?v=8"></script>
<script src="/js/chat.js?v=10"></script>
<script src="/js/workdir.js?v=3"></script>
<script src="/js/sidebar.js?v=31"></script>
<script src="/js/providers.js?v=5"></script>
<script src="/js/settings.js?v=5"></script>
<script src="/js/ui.js?v=10"></script>
<script src="/js/scrollbar.js?v=2"></script>
<script src="/js/init.js?v=13"></script>
</body>
</html>
