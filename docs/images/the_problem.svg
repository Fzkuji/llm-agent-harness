<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="880" height="600" fill="#fefefe" rx="12"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">The Problem: LLM Controls the Path</text>
  <line x1="160" y1="48" x2="720" y2="48" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>

  <!-- ===== LEFT: What you designed ===== -->
  <text x="220" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#4ecdc4">✅ What You Designed</text>

  <!-- Clean path: A → B → C → Done -->
  <rect x="80" y="100" width="90" height="40" rx="8" fill="#e0f7f5" stroke="#4ecdc4" stroke-width="2"/>
  <text x="125" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a8f85">A</text>
  <text x="125" y="155" text-anchor="middle" font-size="10" fill="#888">screenshot</text>

  <line x1="170" y1="120" x2="205" y2="120" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="210" y="100" width="90" height="40" rx="8" fill="#e0f7f5" stroke="#4ecdc4" stroke-width="2"/>
  <text x="255" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a8f85">B</text>
  <text x="255" y="155" text-anchor="middle" font-size="10" fill="#888">click</text>

  <line x1="300" y1="120" x2="335" y2="120" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="340" y="100" width="90" height="40" rx="8" fill="#e0f7f5" stroke="#4ecdc4" stroke-width="2"/>
  <text x="385" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a8f85">C</text>
  <text x="385" y="155" text-anchor="middle" font-size="10" fill="#888">verify</text>

  <line x1="430" y1="120" x2="452" y2="120" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="475" y="125" font-size="13" fill="#4ecdc4" font-weight="bold">✓ Done</text>

  <!-- ===== RIGHT: What LLM actually does ===== -->
  <text x="660" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff6b6b">❌ What the LLM Does</text>

  <!-- Chaotic path: A → D → A → B → ? → E → ... -->
  <!-- Node A -->
  <rect x="560" y="100" width="60" height="36" rx="8" fill="#fff0f0" stroke="#ff6b6b" stroke-width="2"/>
  <text x="590" y="123" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc0000">A</text>

  <!-- A → D (wrong turn) -->
  <path d="M620,118 Q650,100 680,118" stroke="#ff6b6b" stroke-width="2" fill="none" marker-end="url(#arr-r)"/>
  <rect x="680" y="100" width="60" height="36" rx="8" fill="#fff0f0" stroke="#ff9999" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="710" y="123" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc0000">D</text>
  <text x="710" y="91" font-size="9" fill="#ff6b6b">invented!</text>

  <!-- D → A (back) -->
  <path d="M710,136 Q710,165 640,175 Q580,182 575,155" stroke="#ff9999" stroke-width="1.5" fill="none" marker-end="url(#arr-r)" stroke-dasharray="4,3"/>
  <text x="645" y="175" font-size="9" fill="#ff9999">back to A?</text>

  <!-- A → B -->
  <rect x="560" y="195" width="60" height="36" rx="8" fill="#fff0f0" stroke="#ff6b6b" stroke-width="2"/>
  <text x="590" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc0000">A</text>
  <text x="555" y="215" text-anchor="end" font-size="9" fill="#ff9999">again</text>

  <line x1="620" y1="213" x2="660" y2="213" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arr-r)"/>

  <rect x="665" y="195" width="60" height="36" rx="8" fill="#fff0f0" stroke="#ff6b6b" stroke-width="2"/>
  <text x="695" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc0000">B</text>

  <!-- B → ??? -->
  <path d="M725,213 Q760,213 780,240" stroke="#ff6b6b" stroke-width="2" fill="none" marker-end="url(#arr-r)"/>
  <rect x="755" y="240" width="60" height="36" rx="8" fill="#fff0f0" stroke="#ff9999" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="785" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc0000">E</text>
  <text x="785" y="232" font-size="9" fill="#ff6b6b">skipped C!</text>

  <!-- ... continuing -->
  <text x="820" y="268" font-size="20" fill="#ff9999">⋯</text>

  <!-- ===== Divider ===== -->
  <line x1="40" y1="305" x2="840" y2="305" stroke="#eee" stroke-width="1"/>

  <!-- ===== Detailed Problem Illustration ===== -->
  <text x="440" y="340" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">Why does this happen?</text>

  <!-- Reason 1: LLM is the scheduler -->
  <rect x="40" y="365" width="260" height="120" rx="10" fill="#fff8f8" stroke="#ffdddd"/>
  <text x="170" y="393" text-anchor="middle" font-size="28">🧠</text>
  <text x="170" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc3333">LLM = Scheduler</text>
  <text x="170" y="438" text-anchor="middle" font-size="11" fill="#888">It decides what to do next.</text>
  <text x="170" y="454" text-anchor="middle" font-size="11" fill="#888">You can suggest, but can't force.</text>
  <text x="170" y="470" text-anchor="middle" font-size="11" fill="#888">Skills & prompts are just hints.</text>

  <!-- Reason 2: No deterministic flow -->
  <rect x="320" y="365" width="240" height="120" rx="10" fill="#fff8f8" stroke="#ffdddd"/>
  <text x="440" y="393" text-anchor="middle" font-size="28">🔀</text>
  <text x="440" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc3333">No Fixed Path</text>
  <text x="440" y="438" text-anchor="middle" font-size="11" fill="#888">Same input → different paths.</text>
  <text x="440" y="454" text-anchor="middle" font-size="11" fill="#888">Can't guarantee step order.</text>
  <text x="440" y="470" text-anchor="middle" font-size="11" fill="#888">Can't guarantee output format.</text>

  <!-- Reason 3: Interpretation vs Execution -->
  <rect x="580" y="365" width="260" height="120" rx="10" fill="#fff8f8" stroke="#ffdddd"/>
  <text x="710" y="393" text-anchor="middle" font-size="28">🎯</text>
  <text x="710" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc3333">Interprets, Not Executes</text>
  <text x="710" y="438" text-anchor="middle" font-size="11" fill="#888">"Return JSON" → might add markdown.</text>
  <text x="710" y="454" text-anchor="middle" font-size="11" fill="#888">"Do exactly 3 steps" → does 7.</text>
  <text x="710" y="470" text-anchor="middle" font-size="11" fill="#888">Instructions ≠ guarantees.</text>

  <!-- Bottom line -->
  <rect x="190" y="510" width="500" height="50" rx="25" fill="#ff6b6b"/>
  <text x="440" y="535" text-anchor="middle" font-size="14" fill="white" font-weight="bold">The LLM controls the flow → the flow is unpredictable.</text>
  <text x="440" y="555" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.8)">What if we give flow control back to Python?</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ecdc4"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
</svg>
